services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      DATA_DIR: /data
    volumes:
      - ${DATA_DIR:-./data/clasifica}:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./docker-entrypoint.sh", "api"]
    expose:
      - "8000"

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      DATA_DIR: /data
    volumes:
      - ${DATA_DIR:-./data/clasifica}:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["./docker-entrypoint.sh", "worker"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/clasifica.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
